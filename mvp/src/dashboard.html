<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coding Agent MVP Dashboard</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d1117; --bg-card: #161b22; --bg-card-hover: #1c2129;
  --border: #30363d; --border-light: #21262d;
  --accent: #58a6ff; --success: #3fb950; --error: #f85149;
  --warning: #d29922; --purple: #bc8cff; --orange: #f0883e; --pink: #f778ba;
  --text: #e6edf3; --text-dim: #8b949e; --text-faint: #484f58;
  --radius: 8px; --radius-sm: 4px;
  --thought-bg: rgba(88,166,255,0.08); --action-bg: rgba(240,136,62,0.08);
  --obs-bg: rgba(188,140,255,0.08); --response-bg: rgba(63,185,80,0.08);
}
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 14px; line-height: 1.5; }
a { color: var(--accent); text-decoration: none; }
code, pre { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 12px; }
pre { background: #0d1117; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; overflow-x: auto; white-space: pre-wrap; word-break: break-all; max-height: 180px; overflow-y: auto; }

/* ── Layout ─────────────────────────────────────────────── */
.header { background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 16px; }
.header h1 { font-size: 18px; font-weight: 600; flex: 1; }
.header .badge { background: var(--accent); color: #fff; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
.main { max-width: 1440px; margin: 0 auto; padding: 20px 24px; }
.section { margin-bottom: 28px; }
.section-title { font-size: 15px; font-weight: 600; margin-bottom: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.card-header h3 { font-size: 14px; font-weight: 600; }
.btn { background: var(--bg-card); border: 1px solid var(--border); color: var(--text); padding: 6px 14px; border-radius: var(--radius-sm); cursor: pointer; font-size: 12px; font-weight: 500; transition: all 0.15s; }
.btn:hover { background: var(--bg-card-hover); border-color: var(--accent); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn.primary { background: rgba(88,166,255,0.15); border-color: rgba(88,166,255,0.3); color: var(--accent); }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--text-faint); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty { text-align: center; color: var(--text-dim); padding: 40px 20px; font-size: 14px; }

/* ── Trajectory Viewer (TOP — main focus) ───────────────── */
.traj-viewer { display: grid; grid-template-columns: 300px 1fr; gap: 16px; min-height: calc(100vh - 140px); }
.traj-list { overflow-y: auto; padding: 8px; max-height: calc(100vh - 160px); position: sticky; top: 0; }
.traj-list-item { padding: 10px 12px; border-bottom: 1px solid var(--border-light); cursor: pointer; transition: background 0.1s; border-radius: var(--radius-sm); }
.traj-list-item:hover { background: var(--bg-card-hover); }
.traj-list-item.active { background: rgba(88,166,255,0.1); border-left: 3px solid var(--accent); }
.traj-list-item .prompt { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.traj-list-item .meta { font-size: 11px; color: var(--text-dim); margin-top: 3px; display: flex; gap: 8px; }
.traj-list-item .meta .tag { background: var(--border-light); padding: 1px 6px; border-radius: 3px; }
.traj-list-item.is-sub { opacity: 0.7; font-size: 12px; }
.traj-list-item.is-sub:hover { opacity: 1; }
.role-tag { display: inline-block; font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 3px; margin-right: 4px; text-transform: uppercase; letter-spacing: 0.3px; vertical-align: middle; }
.role-tag.parent { background: rgba(88,166,255,0.15); color: var(--accent); }
.role-tag.sub { background: rgba(247,120,186,0.15); color: var(--pink); }

.traj-detail { padding: 20px; }
.traj-detail .user-input { font-size: 15px; font-weight: 600; margin-bottom: 20px; padding: 12px 16px; background: rgba(88,166,255,0.08); border-left: 3px solid var(--accent); border-radius: var(--radius-sm); }
.traj-detail .user-input .label { font-size: 10px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }

/* ── TAO Loop Visual ────────────────────────────────────── */
.tao-loop { position: relative; margin-bottom: 24px; }
.tao-loop-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.tao-loop-header .round-badge { background: var(--border); color: var(--text); font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 12px; }
.tao-loop-header .dur { font-size: 11px; color: var(--text-faint); }
.tao-loop-header .loop-label { font-size: 10px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 1px; }

/* TAO step timeline */
.tao-steps { position: relative; padding-left: 28px; }
.tao-steps::before { content: ''; position: absolute; left: 11px; top: 0; bottom: 0; width: 2px; background: var(--border); }
.tao-step { position: relative; margin-bottom: 12px; }
.tao-step:last-child { margin-bottom: 0; }
.tao-step::before {
  content: ''; position: absolute; left: -28px; top: 8px;
  width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--border);
  background: var(--bg-card); z-index: 1;
}
/* Step type colors for the dot */
.tao-step.step-T::before { border-color: var(--accent); background: var(--accent); }
.tao-step.step-A::before { border-color: var(--orange); background: var(--orange); }
.tao-step.step-O::before { border-color: var(--purple); background: var(--purple); }
.tao-step.step-O.step-error::before { border-color: var(--error); background: var(--error); }
.tao-step.step-R::before { border-color: var(--success); background: var(--success); }

.tao-step .step-box { border-radius: var(--radius); padding: 10px 14px; }
.tao-step .step-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.tao-step .step-letter { font-size: 11px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; }
.tao-step .step-sublabel { font-size: 10px; color: var(--text-dim); }
.tao-step .step-time { font-size: 10px; color: var(--text-faint); margin-left: auto; }

.tao-step.step-T .step-box { background: var(--thought-bg); border-left: 3px solid var(--accent); }
.tao-step.step-T .step-letter { color: var(--accent); }
.tao-step.step-A .step-box { background: var(--action-bg); border-left: 3px solid var(--orange); }
.tao-step.step-A .step-letter { color: var(--orange); }
.tao-step.step-O .step-box { background: var(--obs-bg); border-left: 3px solid var(--purple); }
.tao-step.step-O .step-letter { color: var(--purple); }
.tao-step.step-O.step-error .step-box { background: rgba(248,81,73,0.08); border-left-color: var(--error); }
.tao-step.step-O.step-error .step-letter { color: var(--error); }
.tao-step.step-R .step-box { background: var(--response-bg); border-left: 3px solid var(--success); }
.tao-step.step-R .step-letter { color: var(--success); }

.step-text { color: var(--text-dim); font-size: 13px; max-height: 120px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; }

.tool-pill { display: inline-block; padding: 1px 8px; border-radius: 3px; font-size: 11px; font-weight: 600; color: #fff; }
.tool-pill.Read { background: var(--accent); }
.tool-pill.Write { background: var(--success); }
.tool-pill.Edit { background: var(--warning); }
.tool-pill.Grep { background: var(--purple); }
.tool-pill.Bash { background: var(--orange); }
.tool-pill.Agent { background: var(--pink); }
.tool-pill.TaskCreate,.tool-pill.TaskUpdate,.tool-pill.TaskList { background: var(--text-faint); }

/* Loop-back arrow between rounds */
.tao-loop-arrow { text-align: center; color: var(--text-faint); font-size: 18px; margin: -8px 0 8px 0; padding-left: 28px; }

/* Sub-agent inline trajectory */
.sub-agent-traj { margin-top: 10px; margin-left: 8px; padding: 12px 14px; border-left: 3px solid var(--pink); border-radius: var(--radius); background: rgba(247,120,186,0.04); }
.sub-agent-traj .sub-agent-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-size: 11px; font-weight: 700; color: var(--pink); text-transform: uppercase; letter-spacing: 0.5px; }
.sub-agent-traj .sub-agent-prompt { font-size: 12px; color: var(--text-dim); margin-bottom: 10px; padding: 6px 10px; background: rgba(247,120,186,0.06); border-radius: var(--radius-sm); }
.sub-agent-traj .tao-loop { margin-bottom: 16px; }
.sub-agent-traj .tao-loop-header .round-badge { font-size: 10px; padding: 2px 8px; }
.sub-agent-traj .step-text { max-height: 80px; font-size: 12px; }
.sub-agent-traj pre { max-height: 120px; font-size: 11px; }
.sub-agent-traj .sub-agent-summary { display: flex; gap: 12px; font-size: 11px; color: var(--text-dim); padding: 6px 0 0; border-top: 1px solid var(--border-light); margin-top: 8px; }
.sub-agent-traj .sub-agent-summary .sum-val { font-weight: 700; color: var(--pink); }

/* Summary bar */
.traj-summary { display: flex; gap: 16px; margin-top: 16px; padding: 10px 14px; background: var(--border-light); border-radius: var(--radius); font-size: 12px; color: var(--text-dim); }
.traj-summary .sum-item { display: flex; align-items: center; gap: 4px; }
.traj-summary .sum-val { font-weight: 700; color: var(--text); }

/* ── Responsive ─────────────────────────────────────────── */
@media (max-width: 900px) {
  .traj-viewer { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="header">
  <h1>Coding Agent MVP Dashboard</h1>
  <span class="badge">Day 1-4</span>
  <button class="btn" onclick="refreshAll()">Refresh</button>
</div>

<div class="main">

<!-- ══ Section 1: TAO Trajectory Viewer (MAIN FOCUS) ══════ -->
<div class="section">
  <div class="section-title">TAO Trajectory Viewer</div>
  <div class="traj-viewer">
    <div class="card traj-list" id="traj-list">
      <div class="empty">Loading sessions...</div>
    </div>
    <div class="card traj-detail" id="traj-detail">
      <div class="empty">Select a session to view its TAO loop</div>
    </div>
  </div>
</div>

</div>

<script>
let currentSessionId = null;
const API = '';
async function fetchJSON(url) { return (await fetch(API+url)).json(); }

const TOOL_COLORS = {
  Read:'#58a6ff', Write:'#3fb950', Edit:'#d29922', Grep:'#bc8cff',
  Bash:'#f0883e', Agent:'#f778ba', TaskCreate:'#8b949e', TaskUpdate:'#8b949e', TaskList:'#8b949e',
};

function escHtml(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// ── TAO Trajectory Rendering ───────────────────────────────
function renderTrajectoryList(sessions) {
  const el = document.getElementById('traj-list');
  if (!sessions.length) { el.innerHTML = '<div class="empty">No trajectories found</div>'; return; }
  let html = '';
  sessions.forEach(s => {
    const prompt = (s.user_input||'').substring(0,40);
    const time = (s.start_time||'').substring(11,19);
    const rounds = s.summary?.total_rounds||0;
    const tools = s.summary?.tool_calls||0;
    const dur = (s.summary?.duration||0).toFixed(1);
    const isSub = !!s.parent_session_id;
    const isParent = (s.child_session_ids||[]).length > 0;
    const roleTag = isSub ? '<span class="role-tag sub">Sub-Agent</span>'
                   : isParent ? '<span class="role-tag parent">Orchestrator</span>' : '';
    const indent = isSub ? 'style="padding-left:24px;border-left:2px solid var(--pink);"' : '';
    html += `<div class="traj-list-item${isSub?' is-sub':''}" data-id="${s.session_id}" onclick="selectSession('${s.session_id}')" ${indent}>
      <div class="prompt">${roleTag}${escHtml(prompt)}</div>
      <div class="meta">
        <span>${time}</span>
        <span class="tag">${rounds}R</span>
        <span class="tag">${tools}T</span>
        <span>${dur}s</span>
      </div>
    </div>`;
  });
  el.innerHTML = html;
}

async function selectSession(sid) {
  currentSessionId = sid;
  document.querySelectorAll('.traj-list-item').forEach(el => el.classList.toggle('active', el.dataset.id===sid));
  const detail = document.getElementById('traj-detail');
  detail.innerHTML = '<div class="empty"><span class="spinner"></span> Loading...</div>';
  renderTrajectoryDetail(await fetchJSON(`/api/trajectories/${sid}`));
}

function renderSubAgentRounds(rounds) {
  let html = '';
  (rounds||[]).forEach((rnd, i) => {
    const dur = (rnd.duration||0).toFixed(1);
    const hasActions = (rnd.actions||[]).length > 0;
    if (i > 0) html += `<div class="tao-loop-arrow">&#8635;</div>`;
    html += `<div class="tao-loop"><div class="tao-loop-header">
      <span class="round-badge">Round ${rnd.round||i+1}</span>
      <span class="loop-label">${hasActions ? 'T &rarr; A &rarr; O' : (rnd.response ? 'Response' : 'T')}</span>
      <span class="dur">${dur}s</span>
    </div><div class="tao-steps">`;
    if (rnd.thought) {
      html += `<div class="tao-step step-T"><div class="step-box">
        <div class="step-header"><span class="step-letter">T</span><span class="step-sublabel">Thought</span></div>
        <div class="step-text">${escHtml(rnd.thought.substring(0,400))}</div>
      </div></div>`;
    }
    (rnd.actions||[]).forEach(a => {
      const toolCls = a.tool||'';
      html += `<div class="tao-step step-A"><div class="step-box">
        <div class="step-header"><span class="step-letter">A</span><span class="tool-pill ${toolCls}">${toolCls}</span><span class="step-time">${(a.time||0).toFixed(2)}s</span></div>
        <pre>${escHtml(JSON.stringify(a.input||{}, null, 2))}</pre>
      </div></div>`;
      html += `<div class="tao-step step-O ${a.is_error?'step-error':''}"><div class="step-box">
        <div class="step-header"><span class="step-letter">O</span><span class="step-sublabel">${a.is_error?'Error':'Result'}</span></div>
        <div class="step-text">${escHtml((a.output||'').substring(0,300))}</div>
      </div></div>`;
    });
    if (rnd.response) {
      html += `<div class="tao-step step-R"><div class="step-box">
        <div class="step-header"><span class="step-letter">Response</span></div>
        <div class="step-text">${escHtml(rnd.response.substring(0,500))}</div>
      </div></div>`;
    }
    html += `</div></div>`;
  });
  return html;
}

function renderTrajectoryDetail(data) {
  const el = document.getElementById('traj-detail');
  if (data.error) { el.innerHTML = `<div class="empty">${data.error}</div>`; return; }

  let html = `<div class="user-input"><div class="label">User Input</div>${escHtml(data.user_input||'')}</div>`;

  const rounds = data.rounds || [];
  rounds.forEach((rnd, i) => {
    const dur = (rnd.duration||0).toFixed(1);
    const hasActions = (rnd.actions||[]).length > 0;

    // Loop-back arrow between rounds
    if (i > 0) {
      html += `<div class="tao-loop-arrow">&#8635;</div>`;
    }

    html += `<div class="tao-loop">`;
    html += `<div class="tao-loop-header">
      <span class="round-badge">Round ${rnd.round||i+1}</span>
      <span class="loop-label">${hasActions ? 'T &rarr; A &rarr; O' : (rnd.response ? 'Response' : 'T')}</span>
      <span class="dur">${dur}s</span>
    </div>`;

    html += `<div class="tao-steps">`;

    // ── T: Thought ──
    if (rnd.thought) {
      html += `<div class="tao-step step-T">
        <div class="step-box">
          <div class="step-header">
            <span class="step-letter">T &mdash; Thought</span>
            <span class="step-sublabel">Model reasoning</span>
          </div>
          <div class="step-text">${escHtml(rnd.thought.substring(0,600))}</div>
        </div>
      </div>`;
    }

    // ── A + O: Action → Observation (per tool call) ──
    (rnd.actions||[]).forEach(a => {
      const toolCls = a.tool||'';
      const isErr = a.is_error;
      // Action
      html += `<div class="tao-step step-A">
        <div class="step-box">
          <div class="step-header">
            <span class="step-letter">A &mdash; Action</span>
            <span class="tool-pill ${toolCls}">${toolCls}</span>
            <span class="step-time">${(a.time||0).toFixed(2)}s</span>
          </div>
          <pre>${escHtml(JSON.stringify(a.input||{}, null, 2))}</pre>
        </div>
      </div>`;
      // Observation
      let obsHtml = `<div class="tao-step step-O ${isErr?'step-error':''}">
        <div class="step-box">
          <div class="step-header">
            <span class="step-letter">O &mdash; Observation</span>
            <span class="step-sublabel">${isErr?'Error':'Tool result'}</span>
          </div>
          <div class="step-text">${escHtml((a.output||'').substring(0,500))}</div>`;
      // Inline sub-agent trajectory
      if (a.sub_trajectory) {
        const sub = a.sub_trajectory;
        const ss = sub.summary||{};
        obsHtml += '<div class="sub-agent-traj">';
        obsHtml += '<div class="sub-agent-header">&#x1F916; Sub-Agent Session (' + escHtml(sub.session_id||'') + ')</div>';
        obsHtml += '<div class="sub-agent-prompt">' + escHtml(sub.user_input||'') + '</div>';
        obsHtml += renderSubAgentRounds(sub.rounds);
        obsHtml += '<div class="sub-agent-summary">';
        obsHtml += '<span><span class="sum-val">' + (ss.total_rounds||0) + '</span> rounds</span>';
        obsHtml += '<span><span class="sum-val">' + (ss.tool_calls||0) + '</span> tool calls</span>';
        obsHtml += '<span><span class="sum-val">' + (ss.duration||0).toFixed(1) + 's</span></span>';
        obsHtml += '</div></div>';
      }
      obsHtml += '</div></div>';
      html += obsHtml;
    });

    // ── R: Final Response (only on end_turn rounds) ──
    if (rnd.response) {
      html += `<div class="tao-step step-R">
        <div class="step-box">
          <div class="step-header">
            <span class="step-letter">Response</span>
            <span class="step-sublabel">Final answer to user</span>
          </div>
          <div class="step-text">${escHtml(rnd.response.substring(0,800))}</div>
        </div>
      </div>`;
    }

    html += `</div></div>`; // tao-steps, tao-loop
  });

  // Summary bar
  const s = data.summary||{};
  html += `<div class="traj-summary">
    <div class="sum-item"><span class="sum-val">${s.total_rounds||0}</span> rounds</div>
    <div class="sum-item"><span class="sum-val">${s.tool_calls||0}</span> tool calls</div>
    <div class="sum-item"><span class="sum-val">${(s.duration||0).toFixed(1)}s</span> total</div>
  </div>`;

  el.innerHTML = html;
}

// ── Init ───────────────────────────────────────────────────
async function refreshAll() {
  try {
    const sessions = await fetchJSON('/api/trajectories');
    renderTrajectoryList(sessions);
    if (sessions.length>0 && !currentSessionId) selectSession(sessions[0].session_id);
  } catch(e) { console.error('Init error:',e); }
}
window.addEventListener('DOMContentLoaded', refreshAll);
</script>
</body>
</html>
